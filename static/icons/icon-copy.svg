<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="copyBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8AB0D8"/>
      <stop offset="100%" stop-color="#4A7AAC"/>
    </linearGradient>
    <linearGradient id="copyFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#AECFEE"/>
      <stop offset="100%" stop-color="#6899CC"/>
    </linearGradient>
    <filter id="copyShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#1A3A5C" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Back document -->
  <rect x="12" y="10" width="24" height="30" rx="3" fill="url(#copyBack)" filter="url(#copyShadow)"/>
  <!-- Front document -->
  <rect x="16" y="14" width="24" height="30" rx="3" fill="url(#copyFront)" filter="url(#copyShadow)"/>
  <!-- Lines on front doc -->
  <rect x="20" y="21" width="14" height="2.5" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="20" y="26" width="10" height="2.5" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="20" y="31" width="14" height="2.5" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="20" y="36" width="8" height="2.5" rx="1" fill="#fff" opacity="0.4"/>
  <!-- Shine on front -->
  <rect x="16" y="14" width="24" height="8" rx="3" fill="#fff" opacity="0.18"/>
</svg>
