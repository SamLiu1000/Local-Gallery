<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="masonryB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8C0E8"/>
      <stop offset="100%" stop-color="#5878B8"/>
    </linearGradient>
    <filter id="masonryShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 左列：矮卡片 + 高卡片 -->
  <rect x="5"  y="5"  width="17" height="11" rx="3" fill="url(#masonryB)" filter="url(#masonryShadow)"/>
  <rect x="5"  y="5"  width="5"  height="11" rx="3" fill="#fff" opacity="0.18"/>

  <rect x="5"  y="20" width="17" height="23" rx="3" fill="url(#masonryB)" filter="url(#masonryShadow)"/>
  <rect x="5"  y="20" width="5"  height="23" rx="3" fill="#fff" opacity="0.18"/>

  <!-- 右列：高卡片 + 矮卡片 -->
  <rect x="26" y="5"  width="17" height="23" rx="3" fill="url(#masonryB)" filter="url(#masonryShadow)"/>
  <rect x="26" y="5"  width="5"  height="23" rx="3" fill="#fff" opacity="0.18"/>

  <rect x="26" y="32" width="17" height="11" rx="3" fill="url(#masonryB)" filter="url(#masonryShadow)"/>
  <rect x="26" y="32" width="5"  height="11" rx="3" fill="#fff" opacity="0.18"/>
</svg>