<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="diceBody" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#B8C8E8"/>
    </linearGradient>
    <linearGradient id="diceSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8898C8"/>
      <stop offset="100%" stop-color="#6070A8"/>
    </linearGradient>
    <linearGradient id="diceTop2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0DCFF"/>
      <stop offset="100%" stop-color="#A0B0E0"/>
    </linearGradient>
    <filter id="diceShadow">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-color="#1A2040" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- 3D dice -->
  <!-- Front face -->
  <path d="M8 16 L8 40 L32 40 L32 16 Z" fill="url(#diceBody)" filter="url(#diceShadow)"/>
  <!-- Top face -->
  <path d="M8 16 L20 6 L44 6 L32 16 Z" fill="url(#diceTop2)"/>
  <!-- Right face -->
  <path d="M32 16 L44 6 L44 30 L32 40 Z" fill="url(#diceSide)"/>
  <!-- Front face dots (5) -->
  <circle cx="16" cy="24" r="2.5" fill="#3A4878"/>
  <circle cx="24" cy="24" r="2.5" fill="#3A4878"/>
  <circle cx="16" cy="32" r="2.5" fill="#3A4878"/>
  <circle cx="24" cy="32" r="2.5" fill="#3A4878"/>
  <circle cx="20" cy="28" r="2.5" fill="#3A4878"/>
  <!-- Top face dots (2) -->
  <circle cx="26" cy="9" r="2" fill="#6878B0"/>
  <circle cx="38" cy="12" r="2" fill="#6878B0"/>
  <!-- Right face dot (1) -->
  <circle cx="38" cy="22" r="2" fill="#4A5890"/>
</svg>
