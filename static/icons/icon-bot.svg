<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="botBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7898D8"/>
      <stop offset="100%" stop-color="#3A5898"/>
    </linearGradient>
    <linearGradient id="botHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90AAEC"/>
      <stop offset="100%" stop-color="#4868B8"/>
    </linearGradient>
    <filter id="botShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0A1838" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Antenna -->
  <line x1="24" y1="4" x2="24" y2="11" stroke="#5A78C0" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="4" r="3" fill="#80B0F0"/>
  <!-- Head -->
  <rect x="10" y="11" width="28" height="20" rx="5" fill="url(#botHead)" filter="url(#botShadow)"/>
  <!-- Head shine -->
  <rect x="10" y="11" width="28" height="8" rx="5" fill="#fff" opacity="0.18"/>
  <!-- Eyes -->
  <rect x="15" y="17" width="7" height="7" rx="2" fill="#1A2848"/>
  <circle cx="18" cy="20" r="2.5" fill="#40A0FF"/>
  <circle cx="17" cy="19" r="1" fill="#fff" opacity="0.8"/>
  <rect x="26" y="17" width="7" height="7" rx="2" fill="#1A2848"/>
  <circle cx="29" cy="20" r="2.5" fill="#40A0FF"/>
  <circle cx="28" cy="19" r="1" fill="#fff" opacity="0.8"/>
  <!-- Body -->
  <rect x="12" y="33" width="24" height="12" rx="4" fill="url(#botBody)" filter="url(#botShadow)"/>
  <!-- Body panel dots -->
  <circle cx="19" cy="39" r="2" fill="#6080C0"/>
  <circle cx="24" cy="39" r="2" fill="#6080C0"/>
  <circle cx="29" cy="39" r="2" fill="#6080C0"/>
  <!-- Arms -->
  <rect x="4" y="34" width="8" height="5" rx="2.5" fill="url(#botBody)"/>
  <rect x="36" y="34" width="8" height="5" rx="2.5" fill="url(#botBody)"/>
</svg>
