<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="webGlobe" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#60B0F8"/>
      <stop offset="100%" stop-color="#1860C8"/>
    </radialGradient>
    <filter id="webShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0A1848" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Globe body -->
  <circle cx="24" cy="24" r="20" fill="url(#webGlobe)" filter="url(#webShadow)"/>
  <!-- Latitude lines -->
  <ellipse cx="24" cy="24" rx="20" ry="8" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.3"/>
  <line x1="4" y1="24" x2="44" y2="24" stroke="#fff" stroke-width="1.2" opacity="0.3"/>
  <!-- Longitude curves -->
  <path d="M24 4 Q30 14 30 24 Q30 34 24 44" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.3"/>
  <path d="M24 4 Q18 14 18 24 Q18 34 24 44" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.3"/>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="#4898E8" stroke-width="1.5" opacity="0.5"/>
  <!-- Shine -->
  <ellipse cx="17" cy="14" rx="7" ry="4" fill="#fff" opacity="0.3" transform="rotate(-25 17 14)"/>
</svg>
