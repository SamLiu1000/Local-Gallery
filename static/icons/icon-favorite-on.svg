<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="starFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFE860"/>
      <stop offset="50%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#E07800"/>
    </linearGradient>
    <filter id="starShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#804000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Star body -->
  <polygon points="24,4 29,18 44,18 32,27 37,42 24,33 11,42 16,27 4,18 19,18" fill="url(#starFill)" filter="url(#starShadow)"/>
  <!-- Shine on upper left face -->
  <polygon points="24,4 19,18 24,18" fill="#fff" opacity="0.3"/>
  <polygon points="4,18 16,27 19,18" fill="#fff" opacity="0.15"/>
  <!-- Edge highlight -->
  <polygon points="24,4 29,18 44,18 32,27 37,42 24,33 11,42 16,27 4,18 19,18" fill="none" stroke="#FFC800" stroke-width="1" opacity="0.6"/>
</svg>
