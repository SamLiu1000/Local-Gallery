<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="tplBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8F0E8"/>
      <stop offset="100%" stop-color="#DDD0C0"/>
    </linearGradient>
    <linearGradient id="tplHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8868C8"/>
      <stop offset="100%" stop-color="#5840A0"/>
    </linearGradient>
    <filter id="tplShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1A0838" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Document -->
  <rect x="6" y="6" width="36" height="38" rx="4" fill="url(#tplBody)" filter="url(#tplShadow)"/>
  <!-- Header band -->
