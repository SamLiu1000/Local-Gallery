  <rect x="6" y="12" width="36" height="5" fill="url(#tplHeader)"/>
  <!-- Header shine -->
  <rect x="6" y="6" width="36" height="5" rx="4" fill="#fff" opacity="0.2"/>
  <!-- Placeholder blocks on doc -->
  <rect x="10" y="22" width="18" height="4" rx="2" fill="#C0B0A0" opacity="0.6"/>
  <rect x="10" y="29" width="28" height="3" rx="1.5" fill="#C0B0A0" opacity="0.4"/>
  <rect x="10" y="34" width="22" height="3" rx="1.5" fill="#C0B0A0" opacity="0.4"/>
  <rect x="10" y="39" width="16" height="3" rx="1.5" fill="#C0B0A0" opacity="0.3"/>
