<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="64" height="64">
  <defs>
    <linearGradient id="lockBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0A030"/>
      <stop offset="100%" stop-color="#B86000"/>
    </linearGradient>
    <linearGradient id="lockShackle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#707070"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <filter id="lockShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3A2000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 锁梁：锁定状态，居中对称 -->
  <path d="M31 23 L31 17 C31 9, 17 9, 17 17 L17 23"
        fill="none" stroke="url(#lockShackle)" stroke-width="4" stroke-linecap="round" filter="url(#lockShadow)"/>

  <!-- 锁梁高光 -->
  <path d="M29 22 L29 17 C29 11, 19 11, 19 17 L19 22"
        fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- 锁体 -->
  <rect x="10" y="24" width="28" height="20" rx="4" fill="url(#lockBody)" filter="url(#lockShadow)"/>

  <!-- 锁体高光 -->
  <rect x="10" y="24" width="28" height="8" rx="4" fill="#fff" opacity="0.18"/>

  <!-- 钥匙孔 -->
  <circle cx="24" cy="32" r="3.5" fill="#7A3800"/>
  <rect x="22" y="34" width="4" height="5" rx="1" fill="#7A3800"/>
</svg>
