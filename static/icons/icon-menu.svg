<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="menuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0A8C0"/>
      <stop offset="100%" stop-color="#6A7090"/>
    </linearGradient>
    <filter id="menuShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#2A2D40" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Three menu bars with depth -->
  <rect x="8" y="12" width="32" height="5.5" rx="2.75" fill="url(#menuGrad)" filter="url(#menuShadow)"/>
  <rect x="8" y="21" width="32" height="5.5" rx="2.75" fill="url(#menuGrad)" filter="url(#menuShadow)"/>
  <rect x="8" y="30" width="32" height="5.5" rx="2.75" fill="url(#menuGrad)" filter="url(#menuShadow)"/>
  <!-- Shine on each bar -->
  <rect x="8" y="12" width="32" height="2.5" rx="2.75" fill="#fff" opacity="0.25"/>
  <rect x="8" y="21" width="32" height="2.5" rx="2.75" fill="#fff" opacity="0.25"/>
  <rect x="8" y="30" width="32" height="2.5" rx="2.75" fill="#fff" opacity="0.25"/>
</svg>
