<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8ECFF"/>
      <stop offset="100%" stop-color="#A0C8E8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      @keyframes swipe {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(-55deg); }
        100% { transform: rotate(0deg); }
      }
      .wiper {
        animation: swipe 1.2s ease-in-out infinite;
        transform-origin: 16px 36px;
      }
      .wiper-blade {
        animation: swipe 1.2s ease-in-out infinite;
        transform-origin: 16px 36px;
      }
      @keyframes drop1 {
        0%, 80% { opacity: 0; transform: translateY(0); }
        85% { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(3px); }
      }
      @keyframes drop2 {
        0%, 60% { opacity: 0; transform: translateY(0); }
        65% { opacity: 0.6; }
        80% { opacity: 0; transform: translateY(3px); }
        100% { opacity: 0; }
      }
      .drop1 { animation: drop1 1.2s ease-in infinite; }
      .drop2 { animation: drop2 1.2s ease-in infinite; }
    </style>
  </defs>

  <!-- 玻璃 -->
  <polygon points="6,8 42,8 44,30 4,30" fill="url(#glassGrad)" stroke="#80A8C8" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="8,10 40,10 41,18 7,18" fill="#FFFFFF" opacity="0.4"/>

  <!-- 雨滴 -->
  <circle class="drop1" cx="14" cy="22" r="2" fill="#6098C0" opacity="0"/>
  <circle class="drop2" cx="34" cy="18" r="1.8" fill="#6098C0" opacity="0"/>

  <!-- 雨刮器臂 -->
  <line class="wiper" x1="16" y1="36" x2="28" y2="20" stroke="#222222" stroke-width="3.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- 雨刮器刮片 -->
  <line class="wiper-blade" x1="24" y1="28" x2="36" y2="17" stroke="#111111" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <line class="wiper-blade" x1="24" y1="28" x2="36" y2="17" stroke="#555555" stroke-width="2" stroke-linecap="round"/>

  <!-- 轴心（已移到底部） -->
  <circle cx="16" cy="36" r="3.5" fill="#333333" stroke="#111111" stroke-width="1.5"/>
  <circle cx="16" cy="36" r="1.5" fill="#777777"/>
</svg>