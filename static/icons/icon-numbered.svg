<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="imgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8C0E8"/>
      <stop offset="100%" stop-color="#5878B8"/>
    </linearGradient>
    <linearGradient id="numBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80E0A0"/>
      <stop offset="100%" stop-color="#38A860"/>
    </linearGradient>
    <filter id="imgShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#1A2848" flood-opacity="0.4"/>
    </filter>
    <filter id="badgeShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0A3020" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 图片主体 -->
  <rect x="4" y="4" width="34" height="34" rx="4" fill="url(#imgGrad)" filter="url(#imgShadow)"/>
  <rect x="4" y="4" width="34" height="10" rx="4" fill="#fff" opacity="0.18"/>
  <!-- 太阳 -->
  <circle cx="13" cy="14" r="5" fill="#FFD840" opacity="0.9"/>
  <circle cx="12" cy="13" r="2" fill="#fff" opacity="0.3"/>
  <!-- 山丘 -->
  <path d="M4 32 L14 18 L22 28 L28 22 L38 32 Z" fill="#4868A8" opacity="0.7"/>
  <path d="M4 32 L4 38 L38 38 L38 32 L28 22 L22 28 L14 18 Z" fill="#3858A0" opacity="0.5"/>

  <!-- 角标：右下角，宽一些容纳 >2 -->
  <rect x="25" y="29" width="20" height="15" rx="5" fill="url(#numBadge)" filter="url(#badgeShadow)"/>
  <rect x="25" y="29" width="20" height="7" rx="5" fill="#fff" opacity="0.22"/>
  <text x="35" y="40.5" font-family="monospace" font-size="9.5" font-weight="bold"
        fill="#fff" text-anchor="middle" opacity="0.95">2</text>
</svg>
