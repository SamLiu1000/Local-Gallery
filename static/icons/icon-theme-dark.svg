<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="moonGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#C8CFF5"/>
      <stop offset="100%" stop-color="#8892D6"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#E8EEFF"/>
      <stop offset="100%" stop-color="#8892D6"/>
    </radialGradient>
    <filter id="moonShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3040A0" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Night sky background -->
  <circle cx="24" cy="24" r="20" fill="#1A1D35"/>
  <!-- Stars -->
  <circle cx="15" cy="12" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="35" cy="10" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="38" cy="20" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="10" cy="28" r="0.8" fill="#fff" opacity="0.5"/>
  <!-- Moon crescent -->
  <circle cx="27" cy="24" r="12" fill="url(#moonGlow)" filter="url(#moonShadow)"/>
  <circle cx="33" cy="20" r="10" fill="#1A1D35"/>
  <!-- Moon surface highlight -->
  <ellipse cx="23" cy="19" rx="4" ry="2.5" fill="#fff" opacity="0.15" transform="rotate(-20 23 19)"/>
</svg>
