<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="camBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A4E60"/>
      <stop offset="100%" stop-color="#2A2C3A"/>
    </linearGradient>
    <linearGradient id="camLens" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#4080C0"/>
      <stop offset="40%" stop-color="#2050A0"/>
      <stop offset="100%" stop-color="#102060"/>
    </linearGradient>
    <radialGradient id="lensShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#80B8FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#102060" stop-opacity="0"/>
    </radialGradient>
    <filter id="camShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#080A14" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Camera body -->
  <rect x="4" y="13" width="40" height="28" rx="5" fill="url(#camBody)" filter="url(#camShadow)"/>
  <!-- Viewfinder bump -->
  <rect x="14" y="8" width="14" height="7" rx="3" fill="#3A3D4E"/>
  <!-- Shutter button -->
  <circle cx="38" cy="11" r="4" fill="#C0C8D8"/>
  <circle cx="38" cy="11" r="2.5" fill="#9098B0"/>
  <!-- Lens outer ring -->
  <circle cx="22" cy="27" r="13" fill="#3A3D4E"/>
  <!-- Lens -->
  <circle cx="22" cy="27" r="10.5" fill="url(#camLens)"/>
  <!-- Lens reflections -->
  <circle cx="22" cy="27" r="10.5" fill="url(#lensShine)"/>
  <circle cx="22" cy="27" r="5" fill="#1A3870" opacity="0.5"/>
  <ellipse cx="18" cy="23" rx="3" ry="2" fill="#fff" opacity="0.3" transform="rotate(-30 18 23)"/>
  <!-- Body shine -->
  <rect x="4" y="13" width="40" height="7" rx="5" fill="#fff" opacity="0.08"/>
  <!-- Flash -->
  <rect x="32" y="20" width="8" height="5" rx="2" fill="#E8E0C0"/>
  <rect x="32" y="20" width="8" height="2.5" rx="2" fill="#fff" opacity="0.5"/>
</svg>
