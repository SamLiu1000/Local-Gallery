  <!-- Lid shine -->
  <rect x="9" y="9" width="30" height="3" rx="3" fill="#fff" opacity="0.2"/>
  <!-- Body -->
  <path d="M12 17 L14 43 Q14 45 16 45 L32 45 Q34 45 34 43 L36 17 Z" fill="url(#trashBody)" filter="url(#trashShadow)"/>
  <!-- Stripes -->
  <line x1="20" y1="22" x2="20" y2="40" stroke="#8A1A1A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="22" x2="24" y2="40" stroke="#8A1A1A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="28" y1="22" x2="28" y2="40" stroke="#8A1A1A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
