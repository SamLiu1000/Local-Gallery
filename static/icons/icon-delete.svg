<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="trashLid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E87070"/>
      <stop offset="100%" stop-color="#B83030"/>
    </linearGradient>
    <linearGradient id="trashBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D45A5A"/>
      <stop offset="100%" stop-color="#A02828"/>
    </linearGradient>
    <filter id="trashShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#600000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Lid handle -->
  <rect x="19" y="5" width="10" height="4" rx="2" fill="url(#trashLid)" filter="url(#trashShadow)"/>
