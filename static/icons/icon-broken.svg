<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="chainL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0A8C0"/>
      <stop offset="100%" stop-color="#606880"/>
    </linearGradient>
    <filter id="chainShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1A1C28" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Left chain link -->
  <g filter="url(#chainShadow)" transform="rotate(-40 16 20)">
    <rect x="7" y="15" width="18" height="10" rx="5" fill="none" stroke="url(#chainL)" stroke-width="4"/>
  </g>
  <!-- Right chain link -->
  <g filter="url(#chainShadow)" transform="rotate(-40 32 28)">
    <rect x="23" y="23" width="18" height="10" rx="5" fill="none" stroke="url(#chainL)" stroke-width="4"/>
  </g>
  <!-- Break gap - jagged lines to show severed -->
  <line x1="20" y1="22" x2="23" y2="18" stroke="#E05050" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="18" x2="26" y2="22" stroke="#E05050" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="22" x2="29" y2="26" stroke="#E05050" stroke-width="2.5" stroke-linecap="round"/>
</svg>
